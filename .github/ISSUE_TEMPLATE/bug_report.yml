name: Bug report
description: Report a reproducible problem in FlowScope
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps and inputs
      placeholder: |
        1. Start services with ...
        2. Open ...
        3. Call endpoint ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: main@<sha>
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - collector
        - api
        - worker
        - web
        - storage
        - deployment/docs
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs and screenshots
