name: Bug report / Сообщение об ошибке
description: Report a reproducible problem in FlowScope / Сообщить о воспроизводимой проблеме
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
        Спасибо за отчёт. Пожалуйста, укажите шаги воспроизведения.
  - type: textarea
    id: summary
    attributes:
      label: Summary / Кратко
      description: What happened? / Что произошло?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Шаги воспроизведения
      description: Exact steps and inputs / Точные шаги и входные данные
      placeholder: |
        1. Start services with ...
        2. Open ...
        3. Call endpoint ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / Фактическое поведение
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: main@<sha>
  - type: dropdown
    id: area
    attributes:
      label: Affected area / Затронутая область
      options:
        - collector
        - api
        - worker
        - web
        - storage
        - deployment/docs
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / Логи и скриншоты
      description: Paste relevant logs and screenshots / Приложите релевантные логи и скриншоты
