name: Feature request / Запрос фичи
description: Propose an enhancement for FlowScope / Предложить улучшение
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement / Описание проблемы
      description: What user problem are you solving? / Какую проблему пользователя решаем?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / Предлагаемое решение
      description: What should be implemented? / Что именно нужно реализовать?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / Рассмотренные альтернативы
  - type: dropdown
    id: impact
    attributes:
      label: Impact area / Область влияния
      options:
        - ingestion
        - normalization/enrichment
        - storage/query
        - dashboard
        - sankey
        - interaction map
        - deployment/ops
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria / Критерии приёмки
      placeholder: |
        - [ ] ...
        - [ ] ...
